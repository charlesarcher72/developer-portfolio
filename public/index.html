<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />

    <title>Charles Archer — Software Engineer</title>
    <meta name="description" content="Charles Archer is a Software Engineer specializing in full-stack development and technical leadership across aerospace systems, web, and mobile." />
    <meta name="author" content="Charles Archer" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Charles Archer — Software Engineer" />
    <meta property="og:description" content="Full-stack engineer and technical leader building mission-critical aerospace systems and modern web/mobile products." />
    <meta property="og:url" content="https://charlesarcher.me/" />
    <meta property="og:image" content="%PUBLIC_URL%/images/preview.png" />
    <meta property="og:site_name" content="Charles Archer" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Charles Archer — Software Engineer" />
    <meta name="twitter:description" content="Full-stack engineer and technical leader building mission-critical aerospace systems and modern web/mobile products." />
    <meta name="twitter:image" content="%PUBLIC_URL%/images/preview.png" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect to font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <link
      rel="stylesheet"
      href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
      integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://code.iconify.design/1/1.0.7/iconify.min.css" />
    <style>
      html, body { background-color: #ffffff; margin: 0; }
      html[data-theme="dark"], html[data-theme="dark"] body { background-color: #0b1220; }
    </style>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script src="https://code.iconify.design/1/1.0.7/iconify.min.js"></script>
  </body>
</html>
